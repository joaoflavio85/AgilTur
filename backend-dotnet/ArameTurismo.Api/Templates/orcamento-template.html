<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{titulo}}</title>
  <style>
    body { margin: 0; font-family: Segoe UI, sans-serif; background: #f8fafc; color: #1f2937; }
    .wrap { max-width: 960px; margin: 24px auto; background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 12px 28px rgba(0,0,0,.12); }
    .cover { width: 100%; height: 320px; object-fit: cover; }
    .head { background: #0f766e; color: #fff; padding: 28px; }
    .section { padding: 24px; border-bottom: 1px solid #e5e7eb; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap: 12px; }
    .card { background: #f1f5f9; border-radius: 10px; padding: 12px; }
    .cta { display: inline-block; margin-top: 16px; background: #0f766e; color: #fff; padding: 10px 14px; text-decoration: none; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="cover" src="{{imagemCapa}}" alt="Destino" />
    <header class="head">
      <h1>{{titulo}}</h1>
      <p>{{destino}}</p>
    </header>

    <section class="section">
      <h2>Descricao do destino</h2>
      <p>{{descricaoDestino}}</p>
    </section>

    <section class="section">
      <h2>Hotel selecionado</h2>
      <p><strong>{{hotel}}</strong></p>
      <p>{{descricaoHotel}}</p>
    </section>

    <section class="section grid">
      <div class="card"><small>Datas</small><div>{{datas}}</div></div>
      <div class="card"><small>Pessoas</small><div>{{numeroPessoas}}</div></div>
      <div class="card"><small>Valor total</small><div>{{valorTotal}}</div></div>
      <div class="card"><small>Pagamento</small><div>{{formaPagamento}}</div></div>
    </section>

    <section class="section">
      <h2>Observacoes</h2>
      <p>{{observacoes}}</p>
      <h2>Condicoes</h2>
      <p>{{condicoes}}</p>
      <a class="cta" href="{{linkAgente}}">Falar com agente</a>
    </section>
  </div>
</body>
</html>
