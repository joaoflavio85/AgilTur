services:
  backend:
    build:
      context: ./backend
    container_name: arame-backend
    env_file:
      - ./backend/.env
    ports:
      - "3001:3001"
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: arame-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

  landing:
    build:
      context: ./agiltur-growth
    container_name: arame-landing
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_BASE_DOMAIN: agencia.local
      AGILTUR_CORE_API_URL: http://backend:3001/api/public/saas/tenants
      AGILTUR_CORE_API_KEY: agiltur_onboarding_local_2026
    ports:
      - "3000:3000"
    restart: unless-stopped
